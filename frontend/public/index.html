<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteGuard | Global Logistics Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg: #020617; 
            --bg2: #0f172a; 
            --panel: #1e293b;
            --accent: #3b82f6; 
            --accent-glow: rgba(59, 130, 246, 0.5);
            --text: #f8fafc; 
            --text2: #94a3b8; 
            --border: rgba(255,255,255,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'DM Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            overflow: hidden; 
        }
        
        #app { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
        
        /* Sidebar Navigation */
        #sidebar { 
            background: var(--bg2); 
            border-right: 1px solid var(--border); 
            padding: 30px 20px; 
            z-index: 100; 
        }

        .logo { 
            font-family: 'Syne', sans-serif; 
            font-weight: 800; 
            font-size: 24px; 
            letter-spacing: -1px; 
            margin-bottom: 50px; 
        }

        .logo span { color: var(--accent); }

        .nav-item { 
            padding: 14px 16px; 
            border-radius: 12px; 
            cursor: pointer; 
            color: var(--text2); 
            transition: 0.3s; 
            margin-bottom: 8px; 
            font-weight: 500;
            border-left: 4px solid transparent;
        }

        .nav-item:hover, .nav-item.active { 
            background: linear-gradient(90deg, rgba(59,130,246,0.2) 0%, rgba(59,130,246,0) 100%);
            border-left: 4px solid var(--accent);
            color: var(--text);
        }

        /* Main Workspace */
        #main { padding: 40px; height: 100vh; overflow-y: auto; }
        
        .page { display: none; }
        
        .page.active { 
            display: block; 
            animation: slideUp 0.4s ease-out; 
        }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* Cards & UI Elements */
        .card { 
            background: var(--panel); 
            border: 1px solid var(--border); 
            border-radius: 16px; 
            padding: 28px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
        }

        .form-input { 
            width: 100%; 
            background: var(--bg); 
            border: 1px solid var(--border); 
            padding: 14px; 
            border-radius: 10px; 
            color: white; 
            margin: 10px 0 20px 0; 
            outline: none; 
            font-family: inherit;
        }

        .btn-primary { 
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 14px; 
            border-radius: 10px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: 0.3s; 
        }

        .btn-primary:hover { 
            filter: brightness(1.2); 
            transform: translateY(-2px);
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        /* Table Styling */
        table { width: 100%; border-collapse: collapse; }
        th { 
            text-align: left; 
            padding: 15px; 
            color: var(--text2); 
            border-bottom: 1px solid var(--border); 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }
        td { padding: 18px 15px; border-bottom: 1px solid var(--border); font-size: 14px; }

        /* Map UI */
        #map { 
            width: 100%; 
            height: 75vh; 
            border-radius: 20px; 
            border: 1px solid var(--border); 
        }

        .map-overlay { 
            position: absolute; 
            top: 25px; 
            right: 25px; 
            z-index: 1000; 
            background: rgba(15, 23, 42, 0.9); 
            padding: 20px; 
            border-radius: 15px; 
            border: 1px solid var(--accent); 
            backdrop-filter: blur(10px); 
            min-width: 220px; 
        }

        /* Animated Truck Marker */
        /* Moving Truck Animation - SLOWED DOWN */
.truck-icon {
    font-size: 24px;
    /* Changed from 4s to 30s for a 'Live' feel. 
       'linear' ensures the speed doesn't change during the trip. */
    transition: all 30s linear; 
    filter: drop-shadow(0 0 10px var(--accent));
    z-index: 1000 !important;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}
    </style>
</head>
<body>

<div id="app">
    <nav id="sidebar">
        <div class="logo">Route<span>Guard</span></div>
        <div class="nav-item active" onclick="showPage('dashboard')">📊 Dashboard</div>
        <div class="nav-item" onclick="showPage('new-shipment')">📦 New Shipment</div>
        <div class="nav-item" onclick="showPage('live-map')">📍 Live Tracking</div>
        <div class="nav-item" onclick="showPage('ai-predict')">🤖 AI Analyst</div>
    </nav>

    <main id="main">
        <section id="page-dashboard" class="page active">
            <h1 style="font-family: 'Syne'; margin-bottom: 30px;">Active Fleet Registry</h1>
            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Route Path</th>
                            <th>Cargo</th>
                            <th>Execution</th>
                        </tr>
                    </thead>
                    <tbody id="shipments-body"></tbody>
                </table>
            </div>
        </section>

        <section id="page-new-shipment" class="page">
            <div class="card" style="max-width: 500px; margin: 0 auto;">
                <h2 style="font-family: 'Syne'; margin-bottom: 25px;">Initiate Route Ingestion</h2>
                
                <label>Origin Terminal</label>
                <input type="text" id="ns-origin" class="form-input" placeholder="Mumbai">
                
                <label>Destination Terminal</label>
                <input type="text" id="ns-dest" class="form-input" placeholder="Pune">
                
                <label>Manifest Cargo</label>
                <input type="text" id="ns-cargo" class="form-input" placeholder="High-Value Tech">
                
                <button class="btn-primary" style="width: 100%;" onclick="createShipment()">Deploy Agent to Route</button>
            </div>
        </section>

        <section id="page-live-map" class="page">
            <div style="position: relative;">
                <div id="map"></div>
                <div class="map-overlay">
                    <h3 id="ov-id" style="font-family: 'Syne'; color: var(--accent);">Route Standby</h3>
                    <p id="ov-loc" style="font-size: 13px; color: var(--text2); margin-top: 5px;">Awaiting deployment...</p>
                </div>
            </div>
        </section>

        <section id="page-ai-predict" class="page">
            <div class="card" style="border-left: 5px solid var(--accent);">
                <h2 style="font-family: 'Syne'; margin-bottom: 20px;">Gemini Neural Analysis</h2>
                <select id="ai-shipment-select" class="form-input"></select>
                <button class="btn-primary" onclick="runAIPrediction()">Request Intelligence Report</button>
                <div id="ai-output" style="margin-top: 30px; font-size: 15px; line-height: 1.8; color: #cbd5e1;"></div>
            </div>
        </section>
    </main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const API_BASE = "http://localhost:5000/api";
    let map, currentLine, markers = {};

    function showPage(id) {
        // Update Page Visibility
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(`page-${id}`).classList.add('active');
        
        // Update Sidebar UI
        document.querySelectorAll('.nav-item').forEach(n => {
            n.classList.toggle('active', n.getAttribute('onclick').includes(id));
        });

        // Load Data or Init Map
        if(id === 'dashboard') fetchShipments();
        if(id === 'live-map') initMap();
    }

    function initMap() {
        if (map) return;
        // Initialize map with a clean dark-themed tile set
        map = L.map('map', {zoomControl: false}).setView([20.59, 78.96], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '©OpenStreetMap contributors'
        }).addTo(map);
    }

    async function fetchShipments() {
        try {
            const res = await fetch(`${API_BASE}/shipments`);
            const data = await res.json();
            const tbody = document.getElementById('shipments-body');
            
            // Inside your fetchShipments() .map function:
tbody.innerHTML = data.map(s => `
    <tr>
        <td><b style="color:var(--accent)">${s.id}</b></td>
        <td>${s.origin} ➔ ${s.destination}</td>
        <td>${s.cargo_type}</td>
        <td>
            <button class="btn-primary" style="padding: 6px 15px; font-size: 11px;" 
                onclick="animateRoute(
                    '${s.id}', 
                    ${s.start_lat}, 
                    ${s.start_lng}, 
                    ${s.end_lat}, 
                    ${s.end_lng}, 
                    '${s.destination}'
                )">
                🚀 DISPATCH
            </button>
        </td>
    </tr>
`).join('');
            const select = document.getElementById('ai-shipment-select');
            select.innerHTML = data.map(s => `<option value="${s.id}">${s.id}: ${s.destination}</option>`).join('');
        } catch (err) {
            console.error("Dashboard Fetch Error:", err);
        }
    }

    function animateRoute(id, sLat, sLng, eLat, eLng, dest) {
    if (!sLat || !eLat) {
        alert("Error: Incomplete route data for this shipment.");
        return;
    }

    showPage('live-map');
    initMap();

    const start = [sLat, sLng];
    const end = [eLat, eLng];

    // Draw the Line
    if(currentLine) map.removeLayer(currentLine);
    currentLine = L.polyline([start, end], {
        color: '#3b82f6', weight: 3, dashArray: '10, 10', opacity: 0.6
    }).addTo(map);

    // Set the Truck at Start
    if(markers[id]) map.removeLayer(markers[id]);
    const truck = L.marker(start, {
        icon: L.divIcon({ className: 'truck-icon', html: '🚚', iconAnchor: [15, 15] })
    }).addTo(map);
    markers[id] = truck;

    map.fitBounds(currentLine.getBounds(), {padding: [100, 100]});

    // Animate to End
    setTimeout(() => {
        truck.setLatLng(end);
    }, 1000);
}

    async function createShipment() {
        const payload = {
            id: `RG-${Math.floor(Math.random()*900)+100}`,
            origin: document.getElementById('ns-origin').value,
            dest: document.getElementById('ns-dest').value,
            cargo: document.getElementById('ns-cargo').value
        };

        try {
            const res = await fetch(`${API_BASE}/shipments`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if(res.ok) { 
                alert("Route Ingestion Confirmed!"); 
                showPage('dashboard'); 
            }
        } catch (err) {
            console.error("Ingestion Error:", err);
            alert("System Error: Failed to initiate ingestion.");
        }
    }

    async function runAIPrediction() {
        const shipmentId = document.getElementById('ai-shipment-select').value;
        const out = document.getElementById('ai-output');
        
        if(!shipmentId) return alert("Select a shipment for analysis.");

        out.innerHTML = "<em>Neural processing in progress...</em>";
        
        try {
            const res = await fetch(`${API_BASE}/ai/analyze`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    shipmentId, 
                    weather: 'Monsoon', 
                    traffic: 'Congested'
                })
            });
            const data = await res.json();
            out.innerHTML = `<strong>Gemini Intelligence Response:</strong><br>${data.analysis}`;
        } catch (err) {
            out.innerHTML = "<span style='color: #ef4444;'>Analysis failed. Ensure server and API key are active.</span>";
        }
    }

    // Initial Dashboard Load
    window.onload = fetchShipments;
</script>
</body>
</html>
